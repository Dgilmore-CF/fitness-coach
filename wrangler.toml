name = "ai-fitness-coach"
main = "src/index.js"
# Bumped for Static Assets binding + modern Workers features.
compatibility_date = "2024-11-06"

# Cloudflare Static Assets — serves the frontend directly from the edge.
# The Worker still runs for /api/* routes; everything else is served from assets.
[assets]
directory = "./frontend-dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Cloudflare D1 Database
[[d1_databases]]
binding = "DB"
database_name = "fitness-coach-db"
database_id = "f9bbb522-ad43-4d5b-880f-b21847a97f35"

# Cloudflare R2 Storage
[[r2_buckets]]
binding = "R2"
bucket_name = "fitness-coach-storage"

# Cloudflare Workers AI
[ai]
binding = "AI"

# Durable Objects — one WorkoutSessionDO instance per active workout.
# Holds the live set buffer + timer state in the DO's own embedded SQLite
# (the hot, strongly-consistent store), fans out live updates to every
# connected device over WebSockets, and materializes the finished workout
# into D1 on completion (write-behind).
[[durable_objects.bindings]]
name = "WORKOUT_SESSION"
class_name = "WorkoutSessionDO"

# SQLite-backed DO storage (free-plan eligible). The class must be listed
# here exactly once, the first time it is introduced.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["WorkoutSessionDO"]

# Environment variables
[vars]
ENVIRONMENT = "production"
# AI Gateway — when set, every Workers AI binding call is routed through the
# named gateway for analytics, caching, rate limiting, and cost controls.
AI_GATEWAY_ID = "fitness-coach"
# Cloudflare account id — needed to build the AI Gateway dynamic-routing URL
# (https://gateway.ai.cloudflare.com/v1/<account>/<gateway>/compat/...).
CF_ACCOUNT_ID = "430470778f0d9dbd89d3d69637b2ae9d"
# AI Gateway Dynamic Routing: set this to the route name you create in the
# dashboard (AI Gateway → your gateway → Dynamic Routes). When this AND the
# CF_AIG_TOKEN secret are present, AI calls use `dynamic/<route>` so model
# selection + fallbacks are managed in the dashboard with no code deploy.
# Leave empty to use the in-code Workers AI model fallback chain instead.
AI_GATEWAY_ROUTE = ""

# Secrets (set via CLI, never commit):
#   wrangler secret put JWT_SECRET
#   wrangler secret put USDA_API_KEY
#   wrangler secret put CF_AIG_TOKEN   # gateway auth token for dynamic routing

# Secrets (set via CLI, never commit):
#   wrangler secret put JWT_SECRET
#   wrangler secret put USDA_API_KEY
# Gateway ID is NOT secret (it appears in logs / browser responses only
# as request metadata), so it lives in [vars] for easy rotation.
